{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-surface flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-surface-container-lowest p-8 rounded-3xl shadow-xl border border-outline-variant/10 text-center space-y-6">
        <h1 class="text-2xl font-black text-on-surface tracking-tighter">Upgrade to Pro</h1>
        <p class="text-on-surface-variant font-medium">You are about to unlock limitless potential for your links at ₹399/year. Let's make it liquid smooth.</p>
        
        <!-- Razorpay checkout trigger button -->
        <button id="rzp-button1" class="w-full bg-primary text-on-primary font-black py-4 rounded-xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all transition-transform">
            Pay ₹399 Now
        </button>
        
        <form id="razorpay-form" action="{% url 'razorpay_callback' %}" method="POST" class="hidden">
            {% csrf_token %}
            <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
            <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
            <input type="hidden" name="razorpay_signature" id="razorpay_signature">
        </form>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ razorpay_amount }}",
        "currency": "INR",
        "name": "Trimrr Pro",
        "description": "Annual Precision Links Pro Subscription",
        "image": "https://img.icons8.com/color/512/url.png",
        "order_id": "{{ razorpay_order_id }}",
        "handler": function (response){
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('razorpay-form').submit();
        },
        "prefill": {
            "name": "{{ user.username|default:'' }}",
            "email": "{{ user.email|default:'' }}"
        },
        "theme": {
            "color": "#0058be" 
        }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
