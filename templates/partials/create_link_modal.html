<!-- Create Link Modal Partial -->
<div x-show="openCreateModal" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-on-surface/40 backdrop-blur-md p-4"
     x-cloak>
    
    <div @click.away="openCreateModal = false"
         class="relative w-full max-w-[520px] bg-surface-container-lowest shadow-2xl md:rounded-2xl rounded-t-[2rem] p-8 md:p-10 border-t md:border-none border-outline-variant/20">
        <header class="mb-10 text-center md:text-left">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-secondary-container rounded-xl mb-4 text-primary">
                <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">add_link</span>
            </div>
            <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-on-surface mb-2">Create New Link 🔗</h2>
            <p class="text-on-surface-variant text-sm">Shorten your URL and track clicks instantly.</p>
        </header>

        <form action="{% url 'create_link' %}" method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="url">Original URL</label>
                <input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/40 focus:ring-2 focus:ring-primary rounded-lg py-4 px-4 text-on-surface placeholder:text-outline text-sm transition-all outline-none" id="url" name="url" placeholder="https://your-very-long-destination-url.com/path" type="url" required />
            </div>
            <div class="space-y-2">
                <label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="alias">Custom Alias (optional)</label>
                <div class="flex items-stretch bg-surface-container-low ring-1 ring-outline-variant/40 focus-within:ring-2 focus-within:ring-primary rounded-lg transition-all overflow-hidden">
                    <span class="flex items-center px-4 bg-surface-container text-on-surface-variant text-sm font-medium border-r border-outline-variant/20 whitespace-nowrap">{{ request.get_host }}/</span>
                    <input class="w-full bg-transparent border-0 focus:ring-0 py-4 px-2 text-on-surface placeholder:text-outline text-sm outline-none" id="alias" name="alias" placeholder="my-campaign" type="text" />
                </div>
            </div>
            <div class="pt-4 flex flex-col gap-3">
                <button class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Create Link <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
                <button @click="openCreateModal = false" class="w-full py-2 text-on-surface-variant text-sm font-medium hover:text-on-surface transition-colors" type="button">Cancel</button>
            </div>
        </form>
    </div>
</div>
