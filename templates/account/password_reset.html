{% extends "base.html" %}

{% block title %}Forgot Password | Trimrr{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex flex-col items-center justify-center p-4">
    <!-- Main Card -->
    <div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-[0px_10px_30px_rgba(15,23,42,0.04)] p-8 md:p-10 border border-outline-variant/20">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-gradient-primary rounded-xl mb-4 text-white shadow-lg">
                <span class="material-symbols-outlined text-3xl">key</span>
            </div>
            <h2 class="text-xl font-bold text-on-background tracking-tight mb-3">Forgot your password?</h2>
            <p class="text-on-surface-variant text-sm leading-relaxed">
                Enter your registered email and we'll send you a reset link.
            </p>
        </div>

        <!-- Form -->
        <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="block text-[11px] font-semibold uppercase tracking-widest text-on-secondary-fixed-variant ml-1" for="id_email">
                    Email Address
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline text-lg">mail</span>
                    </div>
                    <input class="block w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant/40 rounded-lg text-sm focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-on-surface" 
                           id="id_email" name="email" placeholder="name@company.com" required type="email" autocomplete="email" />
                </div>
            </div>

            <button class="w-full bg-gradient-primary text-white font-semibold py-3.5 rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm" type="submit">
                Send Reset Link
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
            </button>
        </form>

        <!-- Navigation Footer -->
        <div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
            <a class="inline-flex items-center gap-2 text-sm font-medium text-primary hover:text-primary-container transition-colors group" href="{% url 'account_login' %}">
                <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Login
            </a>
        </div>
    </div>
</main>
{% endblock %}
