{% extends "base.html" %}

{% block title %}Email Sent | Trimrr{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl shadow-[0px_10px_30px_rgba(15,23,42,0.04)] p-8 md:p-10 border border-outline-variant/20 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-primary-container/10 rounded-xl mb-6 text-primary shadow-sm">
            <span class="material-symbols-outlined text-3xl">send</span>
        </div>
        <h2 class="text-xl font-bold text-on-background tracking-tight mb-3">Email Sent!</h2>
        <p class="text-on-surface-variant text-sm leading-relaxed mb-8">
            We've sent a password reset link to your email. Please check your inbox and follow the instructions.
        </p>
        <div class="pt-6 border-t border-outline-variant/10">
            <a class="inline-flex items-center gap-2 text-sm font-medium text-primary hover:text-primary-container transition-colors group" href="{% url 'account_login' %}">
                <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Login
            </a>
        </div>
    </div>
</main>
{% endblock %}
