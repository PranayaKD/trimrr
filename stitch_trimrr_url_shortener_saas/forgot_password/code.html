<!DOCTYPE html>

<html class="light" lang="en"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

                    "colors": {
                        "on-tertiary-fixed": "#311400",
                        "tertiary-fixed-dim": "#ffb786",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#dae2fd",

                        "on-surface-variant": "#424754",

                        "outline": "#727785",

                        "on-error": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-secondary-fixed": "#131b2e",
                        "inverse-on-surface": "#eff1f3",
                        "inverse-primary": "#adc6ff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f2f4f6",
                        "on-primary-fixed": "#001a42",
                        "tertiary": "#924700",

                        "on-tertiary-fixed-variant": "#723600",
                        "primary": "#0058be",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-container": "#fefcff",
                        "surface-tint": "#005ac2",
                        "surface-dim": "#d8dadc",
                        "secondary-container": "#dae2fd",
                        "background": "#f7f9fb",

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0px 10px 30px rgba(15, 23, 42, 0.04), 0px 4px 8px rgba(15, 23, 42, 0.02);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #0058be 0%, #2170e4 100%);
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center p-4">
<!-- Brand Header -->
<header class="mb-8 animate-fade-in">
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 primary-gradient rounded-xl flex items-center justify-center editorial-shadow">
<span class="material-symbols-outlined text-white text-3xl" data-icon="link">link</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-background">Trimrr</h1>
</div>
</header>
<!-- Main Card Container -->
<main class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl editorial-shadow p-8 md:p-10 border border-outline-variant/20">
<!-- Header Content -->
<div class="text-center mb-8">
<h2 class="text-xl font-bold text-on-background tracking-tight mb-3">Forgot your password?</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
                Enter your registered email and we'll send you a reset link.
            </p>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-[11px] font-semibold uppercase tracking-widest text-on-secondary-fixed-variant ml-1" for="email">
                    Email Address
                </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant/40 rounded-lg text-sm focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-on-surface" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<button class="w-full primary-gradient text-on-primary font-semibold py-3.5 rounded-lg editorial-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm" type="submit">
                Send Reset Link
                <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Navigation Footer -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
<a class="inline-flex items-center gap-2 text-sm font-medium text-primary hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
<!-- Support/Legal Footer (Minimal) -->
<footer class="mt-12 text-center space-y-4">
<p class="text-xs text-on-surface-variant/60 font-medium tracking-tight">
            © 2024 Trimrr Editorial. Built for Precision.
        </p>
<div class="flex items-center justify-center gap-6">
<a class="text-xs text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant/40 rounded-full"></span>
<a class="text-xs text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline-variant/40 rounded-full"></span>
<a class="text-xs text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</footer>
<!-- Visual Embellishment: Background Tonal Layers -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30%] h-[40%] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
