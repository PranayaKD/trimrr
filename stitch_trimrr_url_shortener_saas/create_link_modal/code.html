<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#001a42",
                    "surface-container-high": "#e6e8ea",
                    "primary-fixed": "#d8e2ff",
                    "surface-bright": "#f7f9fb",
                    "surface-container-low": "#f2f4f6",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#311400",
                    "tertiary": "#924700",
                    "on-surface": "#191c1e",
                    "secondary-container": "#dae2fd",
                    "on-secondary-fixed": "#131b2e",
                    "outline": "#727785",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "secondary-fixed-dim": "#bec6e0",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#5c647a",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface-container": "#eceef0",
                    "surface-container-highest": "#e0e3e5",
                    "on-surface-variant": "#424754",
                    "surface-dim": "#d8dadc",
                    "inverse-primary": "#adc6ff",
                    "tertiary-fixed": "#ffdcc6",
                    "inverse-on-surface": "#eff1f3",
                    "tertiary-container": "#b75b00",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-container": "#fefcff",
                    "outline-variant": "#c2c6d6",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#adc6ff",
                    "primary": "#0058be",
                    "on-secondary-fixed-variant": "#3f465c",
                    "surface-variant": "#e0e3e5",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "secondary": "#565e74",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#005ac2",
                    "surface": "#f7f9fb",
                    "secondary-fixed": "#dae2fd",
                    "background": "#f7f9fb",
                    "primary-container": "#2170e4",
                    "on-primary-fixed-variant": "#004395",
                    "on-tertiary-fixed-variant": "#723600",
                    "on-background": "#191c1e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Background Dashboard Context (Blurred) -->
<div class="fixed inset-0 z-0 flex blur-sm pointer-events-none grayscale-[0.2] opacity-60">
<!-- SideNavBar Mock -->
<aside class="hidden md:flex flex-col w-64 bg-slate-900 p-4 gap-2">
<div class="px-2 py-4 mb-4">
<span class="text-xl font-black text-white">Trimrr</span>
</div>
<div class="bg-blue-600 text-white rounded-lg p-3 flex items-center gap-3">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-medium text-sm">Dashboard</span>
</div>
<div class="text-slate-400 p-3 flex items-center gap-3">
<span class="material-symbols-outlined">link</span>
<span class="font-medium text-sm">My Links</span>
</div>
</aside>
<!-- Content Area Mock -->
<main class="flex-1 p-8 bg-surface-container-low">
<div class="flex justify-between items-end mb-12">
<div>
<h1 class="text-display-md font-bold tracking-tight text-on-surface">Digital Assets</h1>
<p class="text-on-surface-variant">Performance overview for the last 30 days</p>
</div>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="col-span-2 bg-surface-container-lowest p-8 rounded-xl">
<div class="h-64 bg-surface-container rounded-lg"></div>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl">
<div class="flex items-center gap-2 mb-4">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="label-sm font-semibold uppercase tracking-widest text-on-surface-variant">Live Stats</span>
</div>
<div class="h-32 flex items-end gap-2">
<div class="bg-primary/20 w-full h-1/2 rounded-t-sm"></div>
<div class="bg-primary/20 w-full h-3/4 rounded-t-sm"></div>
<div class="bg-primary/40 w-full h-2/3 rounded-t-sm"></div>
<div class="bg-primary w-full h-full rounded-t-sm"></div>
</div>
</div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-on-surface/40 backdrop-blur-md">
<!-- Modal Content (Bento-style Modal) -->
<div class="relative w-full max-w-[520px] bg-surface-container-lowest shadow-2xl md:rounded-2xl rounded-t-[2rem] p-8 md:p-10 transform transition-all duration-300 ease-out border-t md:border-none border-outline-variant/20">
<!-- Mobile Handle -->
<div class="md:hidden w-12 h-1.5 bg-surface-variant rounded-full mx-auto mb-8"></div>
<!-- Header Section -->
<header class="mb-10 text-center md:text-left">
<div class="inline-flex items-center justify-center w-12 h-12 bg-secondary-container rounded-xl mb-4 text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">add_link</span>
</div>
<h2 class="text-2xl md:text-3xl font-bold tracking-tight text-on-surface mb-2">Create New Link 🔗</h2>
<p class="text-on-surface-variant text-sm">Transform your long URLs into editorial, trackable links in seconds.</p>
</header>
<!-- Form Content -->
<form class="space-y-6">
<!-- Original URL Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="url">
                        Original URL
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/40 focus:ring-2 focus:ring-primary rounded-lg py-4 px-4 text-on-surface placeholder:text-outline text-sm transition-all outline-none" id="url" placeholder="https://your-very-long-destination-url.com/path" type="url"/>
</div>
</div>
<!-- Custom Alias Field -->
<div class="space-y-2">
<label class="block text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="alias">
                        Custom Alias (optional)
                    </label>
<div class="flex items-stretch bg-surface-container-low ring-1 ring-outline-variant/40 focus-within:ring-2 focus-within:ring-primary rounded-lg transition-all overflow-hidden">
<span class="flex items-center px-4 bg-surface-container text-on-surface-variant text-sm font-medium border-r border-outline-variant/20">
                            trimrr.link/
                        </span>
<input class="w-full bg-transparent border-0 focus:ring-0 py-4 px-4 text-on-surface placeholder:text-outline text-sm outline-none" id="alias" placeholder="my-campaign" type="text"/>
</div>
</div>
<!-- Action Area -->
<div class="pt-4 flex flex-col gap-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Create Link
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full py-2 text-on-surface-variant text-sm font-medium hover:text-on-surface transition-colors" type="button">
                        Cancel
                    </button>
</div>
</form>
<!-- Bottom Illustration/Context -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 flex items-center justify-between text-[10px] text-outline font-semibold uppercase tracking-widest">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-xs">encrypted</span>
                    SECURE SSL
                </div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-xs">analytics</span>
                    ADVANCED TRACKING
                </div>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -right-[10%] w-[50%] h-[50%] bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
