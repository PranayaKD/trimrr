<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#001a42",
                    "surface-container-high": "#e6e8ea",
                    "primary-fixed": "#d8e2ff",
                    "surface-bright": "#f7f9fb",
                    "surface-container-low": "#f2f4f6",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#311400",
                    "tertiary": "#924700",
                    "on-surface": "#191c1e",
                    "secondary-container": "#dae2fd",
                    "on-secondary-fixed": "#131b2e",
                    "outline": "#727785",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "secondary-fixed-dim": "#bec6e0",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#5c647a",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface-container": "#eceef0",
                    "surface-container-highest": "#e0e3e5",
                    "on-surface-variant": "#424754",
                    "surface-dim": "#d8dadc",
                    "inverse-primary": "#adc6ff",
                    "tertiary-fixed": "#ffdcc6",
                    "inverse-on-surface": "#eff1f3",
                    "tertiary-container": "#b75b00",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-container": "#fefcff",
                    "outline-variant": "#c2c6d6",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#adc6ff",
                    "primary": "#0058be",
                    "on-secondary-fixed-variant": "#3f465c",
                    "surface-variant": "#e0e3e5",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "secondary": "#565e74",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#005ac2",
                    "surface": "#f7f9fb",
                    "secondary-fixed": "#dae2fd",
                    "background": "#f7f9fb",
                    "primary-container": "#2170e4",
                    "on-primary-fixed-variant": "#004395",
                    "on-tertiary-fixed-variant": "#723600",
                    "on-background": "#191c1e"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tap-target { min-height: 48px; }
    </style>
</head>
<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-md">
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-8">
<div class="w-10 h-10 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl" data-icon="link">link</span>
</div>
<span class="text-2xl font-black tracking-tighter text-on-surface">Trimrr</span>
</div>
<h1 class="text-[2.75rem] leading-[1.1] font-bold tracking-tight text-on-surface text-center mb-2">
                    Create your account
                </h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">
                    Join the precision architecture of link management.
                </p>
</div>
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0px_10px_30px_rgba(15,23,42,0.04),0px_4px_8px_rgba(15,23,42,0.02)]">
<form class="space-y-5">
<div class="space-y-1.5">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="full_name">
                            Full Name
                        </label>
<div class="relative">
<input class="w-full tap-target px-4 py-3 bg-surface-container-low border-0 rounded-lg focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all text-base placeholder:text-outline/50 outline outline-1 outline-outline-variant/40" id="full_name" placeholder="John Architect" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">
                            Email
                        </label>
<div class="relative">
<input class="w-full tap-target px-4 py-3 bg-surface-container-low border-0 rounded-lg focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all text-base placeholder:text-outline/50 outline outline-1 outline-outline-variant/40" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="password">
                            Password
                        </label>
<div class="relative">
<input class="w-full tap-target px-4 py-3 bg-surface-container-low border-0 rounded-lg focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all text-base placeholder:text-outline/50 outline outline-1 outline-outline-variant/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1" for="confirm_password">
                            Confirm Password
                        </label>
<div class="relative">
<input class="w-full tap-target px-4 py-3 bg-surface-container-low border-0 rounded-lg focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all text-base placeholder:text-outline/50 outline outline-1 outline-outline-variant/40" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full tap-target bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold rounded-lg shadow-lg shadow-primary/20 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1 transition-all" href="#">
                            Login
                        </a>
</p>
</div>
</div>
<div class="mt-12 flex justify-center gap-6">
<div class="flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Secure TLS</span>
</div>
<div class="flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-sm" data-icon="cloud_done">cloud_done</span>
<span class="text-[10px] font-bold uppercase tracking-widest">99.9% Uptime</span>
</div>
</div>
</div>
</main>
<footer class="w-full mt-auto flex flex-col items-center py-8 px-6 gap-4 text-center">
<p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">
            © 2024 Trimrr Architecture. All rights reserved.
        </p>
<div class="flex gap-4">
<a class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors" href="#">Privacy</a>
<span class="text-slate-200">/</span>
<a class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors" href="#">Terms</a>
</div>
</footer>
</body></html>
